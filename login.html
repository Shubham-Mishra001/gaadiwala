<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Gaadiwala</title>

  <!-- Link CSS (optional reuse your style.css) -->
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f8fc;
    }

    .login-box {
      background: white;
      padding: 30px;
      width: 350px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    .login-box h2 {
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      background: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #0056b3;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Login / Signup</h2>

    <input type="text" id="firstname" placeholder="Enter First Name">
<input type="text" id="mobile" placeholder="Enter Mobile Number">
<input type="email" id="email" placeholder="Enter Email">
<input type="password" id="password" placeholder="Enter Password">

    <button onclick="login()">Login</button>
    <button onclick="signup()">Sign Up</button>
  </div>

  <!-- IMPORTANT: Firebase auth logic -->
  <script type="module" src="js/auth.js"></script>

</body>
</html>
